<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced OCR Grammar Auditor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --error: #ef4444; --success: #10b981; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
        .container { max-width: 850px; margin: auto; }
        .upload-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 2px dashed #cbd5e1; cursor: pointer; transition: 0.3s; }
        .page-card { background: var(--card); padding: 25px; border-radius: 16px; margin-top: 25px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 6px solid var(--primary); }
        .issue { margin-top: 15px; padding: 12px; background: #fef2f2; border-left: 4px solid var(--error); border-radius: 4px; }
        .orig { color: var(--error); text-decoration: line-through; }
        .corr { color: var(--success); font-weight: 700; }
        #status { text-align: center; margin: 20px 0; font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>Grammar Auditor Pro</h1>
    <label for="upload" class="upload-card">Click to upload PDF (Text or Scanned)</label>
    <input type="file" id="upload" accept="application/pdf" style="display:none">
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    document.getElementById('upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = "";
        
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            status.innerText = `Processing page ${i}...`;
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            
            let text = content.items.map(item => item.str).join(" ");
            
            // If text is empty, perform OCR
            if (text.trim().length < 50) {
                status.innerText = `Scanning page ${i} (OCR)...`;
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport }).promise;
                
                const { data: { text: ocrText } } = await Tesseract.recognize(canvas, 'eng');
                text = ocrText;
            }

            const matches = await checkGrammar(text);
            renderPage(i, matches);
        }
        status.innerText = "✅ Analysis Complete.";
    });

    async function checkGrammar(text) {
        if (text.length < 50) return [];
        try {
            const response = await fetch('https://api.languagetool.org/v2/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ text: text.substring(0, 2000), language: 'en-US' })
            });
            return (await response.json()).matches || [];
        } catch { return []; }
    }

    function renderPage(pageNum, matches) {
        const div = document.createElement('div');
        div.className = 'page-card';
        div.innerHTML = `<h3>Page ${pageNum}</h3>`;
        if (matches.length > 0) {
            matches.slice(0, 5).forEach(m => {
                div.innerHTML += `<div class="issue">
                    <strong>Issue:</strong> ${m.message}<br>
                    <span class="orig">${m.context.text.substring(m.offset, m.offset + m.length)}</span> 
                    → <span class="corr">${m.replacements.slice(0, 1).map(r => r.value).join(', ')}</span>
                </div>`;
            });
        } else {
            div.innerHTML += `<p style="color:var(--success)">✓ No errors detected.</p>`;
        }
        document.getElementById('result').appendChild(div);
    }
</script>
</body>
</html>
