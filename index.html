<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced PDF Grammar Auditor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f1f5f9; --card: #ffffff; --text: #1e293b; --error: #ef4444; --success: #10b981; }
        body { font-family: sans-serif; background: var(--bg); padding: 40px 20px; }
        .container { max-width: 800px; margin: auto; }
        .page-card { background: var(--card); padding: 20px; margin-top: 20px; border-radius: 12px; border-left: 5px solid var(--primary); }
        .issue { margin: 10px 0; padding: 10px; background: #fff1f1; border-left: 4px solid var(--error); }
    </style>
</head>
<body>

<div class="container">
    <h1>Grammar Auditor</h1>
    <input type="file" id="upload" accept="application/pdf">
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    document.getElementById('upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        const status = document.getElementById('status');
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;

        for (let i = 1; i <= pdf.numPages; i++) {
            status.innerText = `Processing page ${i}...`;
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            
            // IMPROVED EXTRACTION: Grouping by Y-coordinates to maintain sentence flow
            let lines = {};
            content.items.forEach(item => {
                let y = Math.round(item.transform[5] / 10); // Round Y to group lines
                if (!lines[y]) lines[y] = [];
                lines[y].push({ x: item.transform[4], str: item.str });
            });

            let text = Object.keys(lines).sort((a, b) => b - a)
                .map(y => lines[y].sort((a, b) => a.x - b.x).map(i => i.str).join(" "))
                .join("\n");

            // OCR Fallback
            if (text.trim().length < 20) {
                const viewport = page.getViewport({ scale: 2.0 });
                const canvas = document.createElement('canvas');
                canvas.height = viewport.height; canvas.width = viewport.width;
                await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;
                const { data: { text: ocrText } } = await Tesseract.recognize(canvas, 'eng');
                text = ocrText;
            }

            console.log("Extracted Text for Page " + i + ":", text); // DEBUG: Check console
            const matches = await checkGrammar(text);
            renderPage(i, matches);
        }
    });

    async function checkGrammar(text) {
        try {
            // Using the correct URL parameters for the public LanguageTool API
            const response = await fetch('https://api.languagetool.org/v2/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ text: text, language: 'en-US', enabledOnly: 'false' })
            });
            const data = await response.json();
            return data.matches || [];
        } catch (e) { return []; }
    }

    function renderPage(pageNum, matches) {
        const div = document.createElement('div');
        div.className = 'page-card';
        div.innerHTML = `<h3>Page ${pageNum} (${matches.length} issues)</h3>`;
        matches.forEach(m => {
            div.innerHTML += `<div class="issue">
                <strong>${m.shortMessage || 'Error'}:</strong> ${m.message}<br>
                <small>Fix: ${m.replacements.slice(0, 3).map(r => r.value).join(', ')}</small>
            </div>`;
        });
        document.getElementById('result').appendChild(div);
    }
</script>
</body>
</html>
