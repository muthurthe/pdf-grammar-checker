<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI PDF Grammar Checker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --success: #059669;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        header { text-align: center; margin-bottom: 40px; }
        h2 { color: var(--primary); margin-bottom: 10px; }
        .upload-area { background: var(--card); border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 12px; transition: 0.3s; cursor: pointer; }
        .upload-area:hover { border-color: var(--primary); background: #f5f3ff; }
        input[type="file"] { display: none; }
        
        .page-container { background: var(--card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-top: 20px; border-left: 5px solid var(--primary); }
        .suggestion-box { margin-top: 15px; padding: 15px; background: #fff5f5; border-left: 4px solid #ef4444; border-radius: 6px; }
        .suggestion-item { margin-bottom: 8px; font-size: 0.95rem; }
        .orig { color: #b91c1c; text-decoration: line-through; }
        .corr { color: #15803d; font-weight: 600; }
        
        #status { text-align: center; margin: 20px 0; font-weight: 600; color: var(--primary); }
        .validation-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; background: #dcfce7; color: var(--success); font-size: 0.8rem; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Grammar Auditor</h2>
        <p>Professional PDF proofreading at your fingertips.</p>
    </header>

    <label for="upload" class="upload-area">
        <p>Click to upload or drag & drop a PDF file</p>
        <input type="file" id="upload" accept="application/pdf">
    </label>

    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    document.getElementById('upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const resultDiv = document.getElementById('result');
        const statusDiv = document.getElementById('status');
        resultDiv.innerHTML = "";
        statusDiv.innerHTML = "Initializing engine...";

        const reader = new FileReader();
        reader.onload = async () => {
            const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(reader.result) }).promise;
            
            for (let i = 1; i <= pdf.numPages; i++) {
                statusDiv.innerHTML = `Analyzing page ${i} of ${pdf.numPages}...`;
                
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                
                let text = "";
                let lastY = null;
                textContent.items.forEach(item => {
                    if (lastY !== null && Math.abs(lastY - item.transform[5]) > 10) text += "\n";
                    text += item.str + " ";
                    lastY = item.transform[5];
                });

                if (text.trim().length > 5) {
                    const matches = await checkGrammar(text);
                    renderPage(i, text, matches);
                    await sleep(1000); 
                }
            }
            statusDiv.innerHTML = "✅ All pages analyzed successfully.";
        };
        reader.readAsArrayBuffer(file);
    });

    async function checkGrammar(text) {
        try {
            const response = await fetch('https://api.languagetool.org/v2/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams({ text: text, language: 'en-US', enabledOnly: 'false' })
            });
            return (await response.json()).matches || [];
        } catch (err) { return []; }
    }

    function renderPage(pageNum, text, matches) {
        const container = document.createElement('div');
        container.className = 'page-container';
        // Added the Validation Badge here
        container.innerHTML = `
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0">Page ${pageNum}</h3>
                <span class="validation-badge">Validation Done</span>
            </div>
        `;

        if (matches.length > 0) {
            const box = document.createElement('div');
            box.className = 'suggestion-box';
            box.innerHTML = `<strong>${matches.length} issue(s) detected:</strong>`;
            matches.forEach(m => {
                const original = text.substring(m.offset, m.offset + m.length);
                const suggestion = m.replacements.length > 0 ? m.replacements[0].value : "Check context";
                const lineNum = text.substring(0, m.offset).split('\n').length;
                box.innerHTML += `<div class="suggestion-item">Line ${lineNum}: <span class="orig">${original}</span> → <span class="corr">${suggestion}</span></div>`;
            });
            container.appendChild(box);
        } else {
            container.innerHTML += `<p style="color:var(--success); font-weight: 500; margin-top: 15px;">✓ No errors found on this page.</p>`;
        }
        document.getElementById('result').appendChild(container);
    }
</script>
</body>
</html>
