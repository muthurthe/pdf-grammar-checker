<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Grammar Checker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; }
        .page-container { border: 1px solid #ddd; margin-bottom: 30px; padding: 20px; background: #f9f9f9; border-radius: 8px; }
        .suggestion-box { margin-top: 15px; padding: 15px; background: #fff; border-left: 5px solid #d32f2f; border-radius: 4px; }
        .suggestion-item { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .orig { color: #d32f2f; text-decoration: line-through; font-weight: bold; }
        .corr { color: #388e3c; font-weight: bold; }
        button { padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        #result { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>PDF Grammar Checker</h2>
    <p>Upload a PDF to extract text and check for grammar errors.</p>
    <input type="file" id="upload" accept="application/pdf">
    <div id="result"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = "<h3>Processing PDF... please wait.</h3>";

            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(reader.result) }).promise;
                    resultDiv.innerHTML = `<h3>Found ${pdf.numPages} pages. Analyzing...</h3>`;
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        
                        // Attempt to preserve lines by checking vertical positioning (y-coordinate)
                        let text = "";
                        let lastY = null;
                        textContent.items.forEach(item => {
                            if (lastY !== null && Math.abs(lastY - item.transform[5]) > 5) {
                                text += "\n";
                            }
                            text += item.str + " ";
                            lastY = item.transform[5];
                        });

                        if (text.trim().length > 0) {
                            const matches = await checkGrammar(text);
                            renderPage(i, text, matches);
                        }
                    }
                } catch (err) {
                    resultDiv.innerHTML = `<p style="color:red;">Error processing file: ${err.message}</p>`;
                }
            };
            reader.readAsArrayBuffer(file);
        });

        async function checkGrammar(text) {
            try {
                const response = await fetch('https://api.languagetool.org/v2/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text: text, language: 'en-US' })
                });
                const data = await response.json();
                return data.matches || [];
            } catch (err) {
                console.error("API Error:", err);
                return [];
            }
        }

        function renderPage(pageNum, text, matches) {
            const container = document.createElement('div');
            container.className = 'page-container';
            container.innerHTML = `<h3>Page ${pageNum}</h3>`;

            if (matches.length > 0) {
                const box = document.createElement('div');
                box.className = 'suggestion-box';
                box.innerHTML = `<strong>Found ${matches.length} Errors:</strong>`;
                
                matches.forEach(m => {
                    const original = text.substring(m.offset, m.offset + m.length);
                    const suggestion = m.replacements.length > 0 ? m.replacements[0].value : "No suggestion";
                    
                    // Line number calculation
                    const textBeforeMatch = text.substring(0, m.offset);
                    const lineNumber = (textBeforeMatch.match(/\n/g) || []).length + 1;
                    
                    box.innerHTML += `
                        <div class="suggestion-item">
                            <strong>Line ${lineNumber}:</strong> 
                            <span class="orig">${original}</span> → 
                            <span class="corr">${suggestion}</span>
                        </div>`;
                });
                container.appendChild(box);
            } else {
                container.innerHTML += `<p style="color:green;">No errors found on this page.</p>`;
            }
            document.getElementById('result').appendChild(container);
        }
    </script>
</body>
</html>
