<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PDF Grammar Checker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: auto; background: #f4f7f6; }
        .page-container { border: 1px solid #ccc; margin-bottom: 20px; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .suggestion-box { margin-top: 15px; padding: 15px; background: #fff5f5; border-left: 5px solid #d32f2f; }
        .suggestion-item { margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .orig { color: #d32f2f; text-decoration: line-through; font-weight: bold; }
        .corr { color: #388e3c; font-weight: bold; }
        #status { font-weight: bold; color: #555; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>PDF Grammar Checker</h2>
    <input type="file" id="upload" accept="application/pdf">
    <div id="status"></div>
    <div id="result"></div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        // Helper to delay requests (prevents API rate limiting)
        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

        document.getElementById('upload').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const resultDiv = document.getElementById('result');
            const statusDiv = document.getElementById('status');
            resultDiv.innerHTML = "";
            statusDiv.innerHTML = "Reading PDF...";

            const reader = new FileReader();
            reader.onload = async () => {
                const pdf = await pdfjsLib.getDocument({ data: new Uint8Array(reader.result) }).promise;
                
                for (let i = 1; i <= pdf.numPages; i++) {
                    statusDiv.innerHTML = `Analyzing page ${i} of ${pdf.numPages}...`;
                    
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    
                    // Improved text extraction logic
                    let text = "";
                    let lastY = null;
                    textContent.items.forEach(item => {
                        // If vertical gap is large, add newline
                        if (lastY !== null && Math.abs(lastY - item.transform[5]) > 10) {
                            text += "\n";
                        }
                        // Add space if items are far apart horizontally
                        text += item.str + " ";
                        lastY = item.transform[5];
                    });

                    if (text.trim().length > 5) {
                        const matches = await checkGrammar(text);
                        renderPage(i, text, matches);
                        // Wait 1 second between pages to respect API limits
                        await sleep(1000); 
                    }
                }
                statusDiv.innerHTML = "Done!";
            };
            reader.readAsArrayBuffer(file);
        });

        async function checkGrammar(text) {
            try {
                const response = await fetch('https://api.languagetool.org/v2/check', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ text: text, language: 'en-US', enabledOnly: 'false' })
                });
                const data = await response.json();
                return data.matches || [];
            } catch (err) {
                return [];
            }
        }

        function renderPage(pageNum, text, matches) {
            const container = document.createElement('div');
            container.className = 'page-container';
            container.innerHTML = `<h3>Page ${pageNum}</h3>`;

            if (matches.length > 0) {
                const box = document.createElement('div');
                box.className = 'suggestion-box';
                box.innerHTML = `<strong>Found ${matches.length} issues:</strong>`;
                
                matches.forEach(m => {
                    const original = text.substring(m.offset, m.offset + m.length);
                    const suggestion = m.replacements.length > 0 ? m.replacements[0].value : "Check context";
                    const lineNum = text.substring(0, m.offset).split('\n').length;
                    
                    box.innerHTML += `
                        <div class="suggestion-item">
                            Line ${lineNum}: <span class="orig">${original}</span> → <span class="corr">${suggestion}</span>
                        </div>`;
                });
                container.appendChild(box);
            } else {
                container.innerHTML += `<p style="color:green;">No errors found.</p>`;
            }
            document.getElementById('result').appendChild(container);
        }
    </script>
</body>
</html>
